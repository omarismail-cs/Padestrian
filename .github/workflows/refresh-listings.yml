name: Refresh listings

on:
  schedule:
    - cron: '0 13 */4 * *'  # every 4 days at 9 AM Ottawa time (UTC-4)
  workflow_dispatch:         # run manually from GitHub Actions tab anytime

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browser
        run: python -m playwright install chromium --with-deps

      - name: Restore walk zones for scoring
        run: |
          mkdir -p data/zones data/isochrones public/data/zones
          cp public/data/zones/grocery-10min.geojson data/zones/
          cp public/data/zones/transit-10min.geojson data/zones/
          if [ -f public/data/isochrones/smoke.geojson ]; then
            cp public/data/isochrones/smoke.geojson data/isochrones/
          fi

      - name: Run pipeline
        env:
          ORS_API_KEY: ${{ secrets.ORS_API_KEY }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          LISTINGS_BACKEND: supabase
        run: |
          python -m padestrian scrape-listings --append
          python -m padestrian prune-kijiji
          python -m padestrian backfill-bathrooms --fetch
          python -m padestrian validate-listings
          python -m padestrian filter-listings
          python -m padestrian export-listings --output public/data/listings-scored.geojson

      - name: Verify Supabase listing count
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          python -c "
          from padestrian.db import fetch_active_listings
          rows = fetch_active_listings()
          eligible = sum(1 for r in rows if r.get('eligible'))
          print(f'active: {len(rows)}, eligible: {eligible}')
          assert len(rows) > 0, 'no active listings in Supabase'
          "
